<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NYMBL - DOCRAG</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f0f4ff; --sidebar: #1e1b4b; --chat-bg: #ffffff;
      --bubble: #f1f5f9; --user-bubble: #ede9fe; --accent: #7c3aed;
      --border: #e2e8f0; --text: #1e293b; --muted: #94a3b8;
      --input-bg: #f8fafc; --pill-bg: #ede9fe; --radius: 8px;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; font-size: 14px; }
    .app { display: flex; height: 100vh; overflow: hidden; }
    .sidebar { width: 300px; min-width: 260px; max-width: 340px; background: var(--sidebar); border-right: 1px solid rgba(255,255,255,.08); display: flex; flex-direction: column; gap: 16px; padding: 20px 16px; overflow-y: auto; }
    .logo { font-size: 13px; font-weight: 700; letter-spacing: 2px; color: #c4b5fd; padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,.1); }
    .upload-zone { border: 1.5px dashed rgba(255,255,255,.2); border-radius: var(--radius); padding: 28px 16px; text-align: center; color: rgba(255,255,255,.45); cursor: pointer; transition: border-color .2s, background .2s; line-height: 1.6; }
    .upload-zone:hover, .upload-zone.dragover { border-color: #c4b5fd; background: rgba(196,181,253,.08); color: #c4b5fd; }
    .upload-zone .icon { font-size: 28px; display: block; margin-bottom: 8px; }
    .progress-area { display: none; flex-direction: column; gap: 8px; }
    .progress-area.visible { display: flex; }
    .progress-bar { height: 4px; background: rgba(255,255,255,.15); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: #c4b5fd; border-radius: 2px; width: 0%; transition: width .3s; }
    .progress-msg { font-size: 12px; color: rgba(255,255,255,.5); }
    .doc-card { display: none; background: #2d2370; border-radius: var(--radius); padding: 12px; }
    .doc-card.visible { display: block; }
    .doc-card .label { font-size: 10px; letter-spacing: 1.5px; color: #c4b5fd; margin-bottom: 6px; }
    .doc-card .doc-name { font-weight: 600; font-size: 13px; margin-bottom: 4px; word-break: break-all; color: #f1f5f9; }
    .doc-card .doc-meta { font-size: 11px; color: rgba(255,255,255,.45); margin-bottom: 10px; }
    .clear-btn { font-size: 11px; color: rgba(255,255,255,.4); background: none; border: 1px solid rgba(255,255,255,.15); border-radius: 4px; padding: 4px 10px; cursor: pointer; width: 100%; transition: color .2s, border-color .2s; }
    .clear-btn:hover { color: #f87171; border-color: #f87171; }
    .sidebar-error { font-size: 12px; color: #f87171; background: rgba(248,113,113,.15); border-radius: 4px; padding: 8px; display: none; }
    .sidebar-error.visible { display: block; }
    .chat { flex: 1; display: flex; flex-direction: column; background: var(--chat-bg); min-width: 0; }
    .messages { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 16px; }
    .messages:empty::after { content: "Upload a PDF, then ask a question."; color: var(--muted); font-size: 13px; display: block; text-align: center; margin-top: 20vh; }
    .msg { display: flex; flex-direction: column; max-width: 75%; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.assistant { align-self: flex-start; align-items: flex-start; }
    .bubble { padding: 10px 14px; border-radius: var(--radius); line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
    .bubble.rendered { white-space: normal; }
    .bubble.rendered p { margin-bottom: 8px; }
    .bubble.rendered p:last-child { margin-bottom: 0; }
    .bubble.rendered ul, .bubble.rendered ol { padding-left: 20px; margin-bottom: 8px; }
    .bubble.rendered li { margin-bottom: 4px; }
    .bubble.rendered strong { color: #6d28d9; }
    .bubble.rendered code { background: rgba(0,0,0,.06); padding: 1px 5px; border-radius: 3px; font-family: monospace; font-size: 12px; }
    .msg.user .bubble { background: var(--user-bubble); color: var(--text); }
    .msg.assistant .bubble { background: var(--bubble); border-left: 3px solid var(--accent); }
    .citations { margin-top: 14px; border-top: 1px solid var(--border); padding-top: 10px; }
    .citations-header { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 8px; }
    .citation-ref { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 10px; font-size: 12px; }
    .ref-body { display: flex; flex-direction: column; gap: 3px; align-items: flex-start; }
    .ref-page-heading { font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: .06em; text-transform: uppercase; max-width: 220px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ref-num { color: var(--muted); font-size: 11px; font-weight: 700; min-width: 24px; padding-top: 2px; }
    .cite-badge { display: inline-flex; align-items: center; justify-content: center; background: var(--pill-bg); color: var(--accent); border-radius: 4px; padding: 0 4px; font-size: 10px; font-weight: 700; cursor: pointer; vertical-align: super; line-height: 1.4; margin: 0 1px; transition: background .2s; user-select: none; }
    .cite-badge:hover { background: #ddd6fe; }
    .pill-ghost { opacity: .4; cursor: default; pointer-events: none; }
    .pill { background: var(--pill-bg); color: var(--accent); border-radius: 20px; padding: 2px 10px; font-size: 11px; cursor: pointer; position: relative; transition: background .2s; user-select: none; display: inline-flex; align-items: center; gap: 5px; }
    .pill:hover { background: #ddd6fe; }
    .pill-sim { font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 10px; line-height: 1.4; }
    .sim-high { background: rgba(5,150,105,.12); color: #059669; }
    .sim-mid  { background: rgba(217,119,6,.12);  color: #d97706; }
    .sim-low  { background: rgba(220,38,38,.12);  color: #dc2626; }
    .tooltip { display: none; position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%); background: #1e293b; border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; font-size: 11px; color: #f8fafc; line-height: 1.5; width: 280px; white-space: normal; z-index: 10; box-shadow: 0 8px 24px rgba(0,0,0,.15); pointer-events: none; }
    .pill:hover .tooltip { display: block; }
    .error-bubble { align-self: flex-start; background: rgba(220,38,38,.08); border-left: 3px solid #dc2626; color: #dc2626; padding: 10px 14px; border-radius: var(--radius); font-size: 13px; }
    .input-bar { display: flex; gap: 8px; padding: 16px 20px; border-top: 1px solid var(--border); background: var(--chat-bg); }
    .input-bar input { flex: 1; background: var(--input-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; color: var(--text); font-size: 14px; outline: none; transition: border-color .2s; }
    .input-bar input:focus { border-color: var(--accent); }
    .input-bar input::placeholder { color: var(--muted); }
    .input-bar input:disabled { opacity: .5; cursor: not-allowed; }
    .send-btn { background: var(--accent); color: #ffffff; border: none; border-radius: var(--radius); padding: 10px 18px; font-size: 16px; font-weight: 700; cursor: pointer; transition: background .2s; flex-shrink: 0; }
    .send-btn:hover:not(:disabled) { background: #6d28d9; }
    .send-btn:disabled { opacity: .4; cursor: not-allowed; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo">NYMBL - DOCRAG</div>
    <div class="upload-zone" id="upload-zone">
      <input type="file" id="file-input" accept=".pdf" hidden>
      <span class="icon">📄</span>
      <strong>Drop PDF here</strong><br>or click to upload
    </div>
    <div class="progress-area" id="progress-area">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-msg" id="progress-msg">Starting…</div>
    </div>
    <div class="doc-card" id="doc-card">
      <div class="label">LOADED DOCUMENT</div>
      <div class="doc-name" id="doc-name"></div>
      <div class="doc-meta" id="doc-meta"></div>
      <button class="clear-btn" id="clear-btn">Clear document</button>
    </div>
    <div class="sidebar-error" id="sidebar-error"></div>
  </aside>
  <main class="chat">
    <div class="messages" id="messages"></div>
    <div class="input-bar">
      <input type="text" id="query-input" placeholder="Upload a PDF first" disabled>
      <button class="send-btn" id="send-btn" disabled>→</button>
    </div>
  </main>
</div>
<script>
  const $ = id => document.getElementById(id);
  let currentDoc = null;
  let queryActive = false;
  let conversationHistory = [];

  async function readSSE(response, onEvent) {
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          const raw = line.slice(6).trim();
          if (raw) { await onEvent(JSON.parse(raw)); }
        }
      }
    }
  }

  const uploadZone = $('upload-zone');
  const fileInput = $('file-input');
  uploadZone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => { if (e.target.files[0]) handleUpload(e.target.files[0]); });
  uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.name.endsWith('.pdf')) handleUpload(file);
    else showSidebarError('Please drop a PDF file.');
  });

  async function handleUpload(file) {
    hideSidebarError();
    currentDoc = null;
    conversationHistory = [];
    $('doc-card').classList.remove('visible');
    queryInput.disabled = true; sendBtn.disabled = true;
    queryInput.placeholder = 'Upload a PDF first';
    showProgress(0, 'Starting…');
    setUploadZoneVisible(false);
    const formData = new FormData();
    formData.append('file', file);
    try {
      const res = await fetch('/ingest', { method: 'POST', body: formData });
      if (!res.ok) { const err = await res.json(); throw new Error(err.detail || 'Upload failed'); }
      let ingestError = null;
      await readSSE(res, event => {
        if (event.status === 'error') {
          ingestError = event.error || event.message || 'Ingest failed';
        } else if (event.status === 'done') {
          currentDoc = { name: file.name, chunkCount: event.chunk_count, docId: event.doc_id };
          showDocCard(file.name, event.chunk_count);
          hideProgress();
          enableInput();
        } else {
          const pct = event.progress ? Math.round(event.progress * 100) : null;
          showProgress(pct, event.message);
        }
      });
      if (ingestError) throw new Error(ingestError);
    } catch (err) {
      hideProgress();
      setUploadZoneVisible(true);
      showSidebarError(err.message);
    }
  }

  const queryInput = $('query-input');
  const sendBtn = $('send-btn');
  sendBtn.addEventListener('click', sendQuery);
  queryInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) sendQuery(); });

  async function sendQuery() {
    const q = queryInput.value.trim();
    if (!q || queryActive || !currentDoc) return;
    queryActive = true;
    queryInput.disabled = true;
    sendBtn.disabled = true;
    queryInput.value = '';
    appendUserMessage(q);
    const assistantBubble = appendAssistantMessage();
    let accumulated = '';
    let sources = [];
    try {
      const res = await fetch('/query', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ question: q, history: conversationHistory }) });
      if (!res.ok) { const err = await res.json(); throw new Error(err.detail || 'Query failed'); }
      await readSSE(res, async event => {
        if (event.type === 'sources') { sources = event.chunks; }
        else if (event.type === 'token') { accumulated += event.text; assistantBubble.textContent = accumulated; }
        else if (event.type === 'error') { throw new Error(event.message || 'Query failed'); }
        else if (event.type === 'done') {
          await renderFinalAnswer(assistantBubble, accumulated, sources);
          conversationHistory.push({ role: 'user', content: q });
          conversationHistory.push({ role: 'assistant', content: accumulated });
          if (conversationHistory.length > 10) conversationHistory = conversationHistory.slice(-10);
        }
      });
    } catch (err) {
      assistantBubble.closest('.msg')?.remove();
      appendErrorBubble(err.message);
    } finally {
      queryActive = false;
      queryInput.disabled = false;
      sendBtn.disabled = false;
      queryInput.focus();
      scrollToBottom();
    }
  }

  function appendUserMessage(text) {
    const msg = document.createElement('div'); msg.className = 'msg user';
    const bubble = document.createElement('div'); bubble.className = 'bubble'; bubble.textContent = text;
    msg.appendChild(bubble); $('messages').appendChild(msg); scrollToBottom(); return bubble;
  }

  function appendAssistantMessage() {
    const msg = document.createElement('div'); msg.className = 'msg assistant';
    const bubble = document.createElement('div'); bubble.className = 'bubble';
    bubble.innerHTML = '<span class="spinner"></span>';
    msg.appendChild(bubble); $('messages').appendChild(msg); scrollToBottom(); return bubble;
  }


  function simBadge(sim) {
    if (sim == null) return '';
    const pct = Math.round(sim * 100);
    const cls = pct >= 75 ? 'sim-high' : pct >= 50 ? 'sim-mid' : 'sim-low';
    return `<span class="pill-sim ${cls}">${pct}%</span>`;
  }

  function makePill(chunkIndex, text, sim) {
    const tip = `<span class="tooltip">${escapeHtml(text)}</span>`;
    return `<span class="pill" data-chunk="${chunkIndex}" data-text="${escapeHtml(text)}" title="Click to open in document">§ ${chunkIndex}${simBadge(sim)}${tip}</span>`;
  }

  $('messages').addEventListener('click', e => {
    const el = e.target.closest('.pill, .cite-badge');
    if (!el) return;
    const text  = el.getAttribute('data-text') || '';
    const chunk = el.getAttribute('data-chunk') || '';
    window.open(`/viewer?chunk=${encodeURIComponent(chunk)}&text=${encodeURIComponent(text.slice(0, 300))}`, '_blank');
  });

  async function renderFinalAnswer(bubble, text, chunks) {
    // chunks entries have { position (1-N), chunk_index, text, similarity, rrf_score, page_number }.
    // The model is given [Chunk 1]..[Chunk N] labels, so `position` is what appears in its output.
    // Map position → sequential display citation number in order of first appearance.
    const citationMap = new Map();
    let citeCounter = 0;

    const markdownHtml = marked.parse(text, { breaks: false, gfm: true });
    const withCites = markdownHtml.replace(/\[[^\]]*Chunk\s+\d+[^\]]*\]/g, match => {
      const positions = [...match.matchAll(/Chunk\s+(\d+)/g)].map(m => parseInt(m[1]));
      if (!positions.length) return match;
      return positions.map(pos => {
        const chunk = chunks.find(c => c.position === pos);
        if (!chunk) return '';   // position outside 1..k → hallucinated, suppress
        if (!citationMap.has(pos)) citationMap.set(pos, ++citeCounter);
        const num = citationMap.get(pos);
        return `<span class="cite-badge" data-chunk="${chunk.chunk_index}" data-text="${escapeHtml(chunk.text)}" title="Click to open in document">[${num}]</span>`;
      }).join('');
    });

    bubble.classList.add('rendered');
    bubble.innerHTML = withCites;

    const unknownAnswer = text.trim().toLowerCase().startsWith("i don't know");
    if (citationMap.size === 0 || unknownAnswer) { scrollToBottom(); return; }

    const cites = document.createElement('div'); cites.className = 'citations';
    const header = document.createElement('div'); header.className = 'citations-header';
    header.textContent = 'References';
    cites.appendChild(header);

    const maxRrf = Math.max(...chunks.map(c => c.rrf_score || 0), 1e-9);
    const orderedEntries = [...citationMap.entries()].sort((a, b) => a[1] - b[1]);
    orderedEntries.forEach(([pos, num]) => {
      const chunk = chunks.find(c => c.position === pos);
      if (!chunk) return;
      const ref = document.createElement('div'); ref.className = 'citation-ref';
      const pageHeading = chunk.page_number ? `<div class="ref-page-heading">Page ${chunk.page_number}</div>` : '';
      // Use cosine sim for semantic matches; RRF-relative % for BM25-only (similarity === 0).
      const pct = (chunk.similarity > 0)
        ? Math.round(chunk.similarity * 100)
        : (chunk.rrf_score > 0)
        ? Math.round(chunk.rrf_score / maxRrf * 100)
        : 0;
      const cls = pct >= 75 ? 'sim-high' : pct >= 50 ? 'sim-mid' : 'sim-low';
      const sim = pct ? `<span class="pill-sim ${cls}">${pct}%</span>` : '';
      const tip = chunk.text ? `<span class="tooltip">${escapeHtml(chunk.text)}</span>` : '';
      ref.innerHTML = `<span class="ref-num">[${num}]</span><div class="ref-body">${pageHeading}<span class="pill" data-chunk="${chunk.chunk_index}" data-text="${escapeHtml(chunk.text)}" title="Click to open in document">§ ${chunk.chunk_index}${sim}${tip}</span></div>`;
      cites.appendChild(ref);
    });

    bubble.closest('.msg').appendChild(cites);
    scrollToBottom();
  }

  function appendErrorBubble(msg) {
    const el = document.createElement('div'); el.className = 'error-bubble';
    el.textContent = `Error: ${msg}`; $('messages').appendChild(el); scrollToBottom();
  }

  function scrollToBottom() { const m = $('messages'); m.scrollTop = m.scrollHeight; }
  function escapeHtml(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function showProgress(pct, msg) { $('progress-area').classList.add('visible'); $('progress-msg').textContent = msg || ''; if (pct !== null) $('progress-fill').style.width = pct + '%'; }
  function hideProgress() { $('progress-area').classList.remove('visible'); }
  function setUploadZoneVisible(v) { uploadZone.style.display = v ? '' : 'none'; }
  function showDocCard(name, count) { $('doc-name').textContent = name; $('doc-meta').textContent = `${count} chunks · 768-dim`; $('doc-card').classList.add('visible'); }
  function showSidebarError(msg) { const el = $('sidebar-error'); el.textContent = msg; el.classList.add('visible'); }
  function hideSidebarError() { $('sidebar-error').classList.remove('visible'); }
  function enableInput() { queryInput.disabled = false; sendBtn.disabled = false; queryInput.placeholder = 'Ask a question…'; queryInput.focus(); }

  $('clear-btn').addEventListener('click', async () => {
    await fetch('/doc', { method: 'DELETE' });
    currentDoc = null;
    conversationHistory = [];
    $('doc-card').classList.remove('visible');
    setUploadZoneVisible(true);
    hideSidebarError();
    fileInput.value = '';
    queryInput.disabled = true; sendBtn.disabled = true;
    queryInput.placeholder = 'Upload a PDF first';
    $('messages').innerHTML = '';
  });

  async function init() {
    try {
      const res = await fetch('/doc/info');
      const info = await res.json();
      if (info.loaded) {
        currentDoc = { docId: info.doc_id, chunkCount: info.chunk_count };
        showDocCard(info.doc_id, info.chunk_count);
        setUploadZoneVisible(false);
        enableInput();
      }
    } catch (_) {}
  }
  init();
</script>
</body>
</html>
