<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DocRAG – Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a14; color: #e2e8f0; font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; }
    #header {
      position: sticky; top: 0; z-index: 100;
      background: #11112b; border-bottom: 1px solid #2a2a4a;
      padding: 10px 16px; display: flex; align-items: center; gap: 8px; font-size: 13px;
    }
    .logo { color: #818cf8; font-weight: 700; letter-spacing: 2px; }
    .sep  { color: #2a2a4a; font-size: 16px; }
    .chunk-id { color: #e2e8f0; font-weight: 600; }
    .hint { margin-left: auto; font-size: 11px; color: #64748b; }
    #status { padding: 48px 20px; text-align: center; color: #64748b; font-size: 14px; }
    #pages { padding: 24px 20px; display: flex; flex-direction: column; align-items: center; gap: 24px; overflow-x: auto; }
    .page-container { display: flex; flex-direction: column; align-items: center; }
    .page-label { font-size: 11px; color: #64748b; margin-bottom: 6px; }
    .page-wrap {
      position: relative; border-radius: 2px; overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,.7);
      background: #fff;
    }
    canvas { display: block; }
    .overlay { position: absolute; top: 0; left: 0; pointer-events: none; }
    .toast {
      position: fixed; bottom: 20px; right: 20px;
      background: #34d399; color: #052e16;
      padding: 10px 16px; border-radius: 8px;
      font-weight: 600; font-size: 13px;
      box-shadow: 0 4px 20px rgba(0,0,0,.5);
      animation: fadeout 0.4s 2.8s ease-out forwards;
    }
    @keyframes fadeout { to { opacity: 0; transform: translateY(6px); } }
  </style>
</head>
<body>
  <div id="header">
    <span class="logo">DOCRAG</span>
    <span class="sep">|</span>
    <span class="chunk-id" id="chunk-id">Document Viewer</span>
    <span class="hint">Chunk highlighted in yellow</span>
  </div>
  <div id="status">Loading document…</div>
  <div id="pages"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const params   = new URLSearchParams(location.search);
  const chunkIdx = params.get('chunk') || '';

  if (chunkIdx) document.getElementById('chunk-id').textContent = `Chunk ${chunkIdx}`;

  // Normalise for text matching: strip non-alpha, collapse spaces.
  const normAlpha = s => s.toLowerCase().replace(/[^a-z0-9\s]/g, ' ').replace(/\s+/g, ' ').trim();
  const wordCount = s => (s.match(/\S+/g) || []).length;

  // Return words (≥minLen chars) that appear in BOTH the chunk and a page's text,
  // preserving the order they appear in the chunk. Used when standard anchors fail
  // because the chunk starts on a different page than where they appear.
  function localAnchors(fullNorm, pageAlpha, minLen = 5, n = 8) {
    const pageWordSet = new Set(pageAlpha.split(' ').filter(w => w.length >= minLen));
    return fullNorm.split(' ').filter(w => w.length >= minLen && pageWordSet.has(w)).slice(0, n);
  }

  // Draw yellow highlight rectangles over matching text items.
  function highlightItems(items, from, to, ctx, vp, scale) {
    ctx.fillStyle = 'rgba(251,191,36,0.4)';
    let pos = 0;
    for (const item of items) {
      const a = normAlpha(item.str || '');
      const start = pos;
      const end   = pos + a.length;
      pos = end + 1; // +1 for separator space
      if (end <= from || start >= to) continue;
      if (!item.width || !item.str?.trim()) continue;
      const [cx, cy] = pdfjsLib.Util.applyTransform(
        [item.transform[4], item.transform[5]], vp.transform
      );
      const h = (item.height || 12) * scale;
      ctx.fillRect(cx - 1, cy - h - 1, item.width * scale + 2, h + 4);
    }
  }

  // Strategy 2: word-sequence — robust to symbol/math extraction differences.
  function highlightByWords(items, anchors, chunkWC, ctx, vp, scale) {
    if (anchors.length < 3) return false;
    let wIdx = 0, firstItem = -1;
    for (let i = 0; i < items.length; i++) {
      for (const w of normAlpha(items[i].str || '').split(' ').filter(Boolean)) {
        if (w === anchors[wIdx]) {
          if (firstItem === -1) firstItem = i;
          if (++wIdx >= anchors.length) break;
        }
      }
      if (wIdx >= anchors.length) break;
    }
    if (firstItem === -1) return false;
    ctx.fillStyle = 'rgba(251,191,36,0.4)';
    let painted = 0;
    for (let i = firstItem; i < items.length && painted < chunkWC * 1.3; i++) {
      const item = items[i];
      if (!item.width || !item.str?.trim()) continue;
      painted += wordCount(item.str);
      const [cx, cy] = pdfjsLib.Util.applyTransform(
        [item.transform[4], item.transform[5]], vp.transform
      );
      const h = (item.height || 12) * scale;
      ctx.fillRect(cx - 1, cy - h - 1, item.width * scale + 2, h + 4);
    }
    return true;
  }

  // Highlight chunk start on page N-1: search for the beginning of the chunk
  // and highlight from that position to the end of the page.
  // Handles cases where _find_chunk_page assigned page N+1 because the chunk
  // opens with math/symbols that extract differently across PDF libraries.
  async function tryHighlightHead(pageObj, vp, scale, overlay, fullText) {
    const tc = await pageObj.getTextContent();
    const items = tc.items;
    const fullNorm = normAlpha(fullText);

    let pageAlpha = '';
    for (const it of items) { pageAlpha += normAlpha(it.str || '') + ' '; }

    const ctx = overlay.getContext('2d');

    // Strategy 1: substring anchors from the start of the chunk, working forward.
    for (const frac of [0.0, 0.1, 0.2, 0.3]) {
      const anchorStart = Math.floor(fullNorm.length * frac);
      const anchor = fullNorm.slice(anchorStart, anchorStart + 80);
      if (anchor.length < 10) continue;
      const pos = pageAlpha.indexOf(anchor);
      if (pos !== -1) {
        const fromPos = Math.max(0, pos - anchorStart);
        highlightItems(items, fromPos, pageAlpha.length + 1, ctx, vp, scale);
        return true;
      }
    }

    // Strategy 2: words that appear in BOTH the chunk and this page — works when
    // the chunk opens with math that normalises differently across PDF libraries.
    const la = localAnchors(fullNorm, pageAlpha);
    if (la.length >= 3 && highlightByWords(items, la, wordCount(fullText), ctx, vp, scale)) {
      return true;
    }
    return false;
  }

  // Highlight chunk continuation on page N+1: search for the tail of the chunk
  // text and highlight from the top of the page down to where the chunk ends.
  async function tryHighlightTail(pageObj, vp, scale, overlay, fullText) {
    const tc = await pageObj.getTextContent();
    const items = tc.items;
    const fullNorm = normAlpha(fullText);

    let pageAlpha = '';
    for (const it of items) { pageAlpha += normAlpha(it.str || '') + ' '; }

    const ctx = overlay.getContext('2d');

    // Anchor from the END of the chunk and work backwards. The chunk's end is
    // guaranteed to be on this page regardless of how small the spill-over is.
    // frac=1.0 → last 80 chars; 0.85 → 80 chars ending at 85%; etc.
    for (const frac of [1.0, 0.85, 0.7, 0.55]) {
      const end    = Math.floor(fullNorm.length * frac);
      const start  = Math.max(0, end - 80);
      const anchor = fullNorm.slice(start, end);
      if (anchor.length < 10) continue;
      const pos = pageAlpha.indexOf(anchor);
      if (pos !== -1) {
        // Chunk ends at: where this anchor ends + any remaining chunk text after it.
        const endPos = pos + anchor.length + (fullNorm.length - end);
        highlightItems(items, 0, endPos, ctx, vp, scale);
        return true;
      }
    }

    // Fallback: substring anchors can miss when the chunk ends with math that
    // normalises differently. Use words from the chunk's tail half that also
    // appear on this page. They should be near the top of the page (the tail
    // starts there). Highlight from page top down to the last such word.
    const sigWords = fullNorm.split(' ').filter(w => w.length >= 5);
    const tailHalf = sigWords.slice(Math.floor(sigWords.length * 0.55)).join(' ');
    const la = localAnchors(tailHalf, pageAlpha, 5, 15);
    if (la.length >= 2) {
      const laSet = new Set(la);
      let lastItem = -1;
      for (let i = 0; i < items.length; i++) {
        const words = normAlpha(items[i].str || '').split(' ').filter(Boolean);
        if (words.some(w => laSet.has(w))) lastItem = i;
      }
      if (lastItem !== -1) {
        ctx.fillStyle = 'rgba(251,191,36,0.4)';
        for (let i = 0; i <= lastItem; i++) {
          const item = items[i];
          if (!item.width || !item.str?.trim()) continue;
          const [cx, cy] = pdfjsLib.Util.applyTransform(
            [item.transform[4], item.transform[5]], vp.transform
          );
          const h = (item.height || 12) * scale;
          ctx.fillRect(cx - 1, cy - h - 1, item.width * scale + 2, h + 4);
        }
        return true;
      }
    }
    return false;
  }

  async function tryHighlight(pageObj, vp, scale, overlay, fullText) {
    const tc      = await pageObj.getTextContent();
    const items   = tc.items;
    const fullNorm = normAlpha(fullText);
    const chunkWC = wordCount(fullText);

    // Build concatenated alpha text for substring search.
    let pageAlpha = '';
    for (const it of items) { pageAlpha += normAlpha(it.str || '') + ' '; }
    pageAlpha = pageAlpha.trimEnd();

    const ctx = overlay.getContext('2d');

    // Strategy 1: substring match at increasing offsets into the chunk (handles
    // math-heavy openings where PyMuPDF and PDF.js normalise differently).
    for (const frac of [0.0, 0.1, 0.2]) {
      const start  = Math.floor(fullNorm.length * frac);
      const anchor = fullNorm.slice(start, start + 130);
      if (!anchor) continue;
      const idx = pageAlpha.indexOf(anchor);
      if (idx !== -1) {
        highlightItems(items, Math.max(0, idx - start), idx - start + fullNorm.length, ctx, vp, scale);
        return;
      }
    }

    // Strategy 2: word-sequence with the first 10 words ≥4 chars from the chunk.
    const anchors = fullNorm.split(' ').filter(w => w.length >= 4).slice(0, 10);
    if (highlightByWords(items, anchors, chunkWC, ctx, vp, scale)) return;

    // Strategy 3: words that are in BOTH the chunk and this page — works even
    // when the chunk opens on a previous page with math-only content so the
    // standard anchors fall beyond the page boundary.
    const la = localAnchors(fullNorm, pageAlpha);
    if (la.length >= 3) highlightByWords(items, la, chunkWC, ctx, vp, scale);
  }

  async function main() {
    const statusEl = document.getElementById('status');
    const pagesDiv = document.getElementById('pages');

    // Fetch full chunk text + stored page number from API.
    let fullText  = '';
    let targetPg  = null;
    if (chunkIdx) {
      try {
        const r = await fetch(`/doc/chunk/${chunkIdx}`);
        if (r.ok) {
          const d  = await r.json();
          fullText = d.text || '';
          targetPg = d.page_number || null; // null for docs indexed before this feature
        }
      } catch (_) {}
    }

    try {
      const pdf = await pdfjsLib.getDocument('/doc/pdf').promise;
      statusEl.textContent = '';

      // ── Phase 1: create all page placeholders (fast — no canvas rendering) ──
      const pageData = [];
      for (let n = 1; n <= pdf.numPages; n++) {
        const page   = await pdf.getPage(n);
        const baseVp = page.getViewport({ scale: 1 });
        const scale  = Math.min(1.5, (window.innerWidth - 48) / baseVp.width);
        const vp     = page.getViewport({ scale });

        const container = document.createElement('div');
        container.className = 'page-container';

        const label = document.createElement('div');
        label.className = 'page-label';
        label.textContent = `Page ${n} of ${pdf.numPages}`;
        container.appendChild(label);

        const wrap = document.createElement('div');
        wrap.className = 'page-wrap';
        wrap.style.width  = vp.width  + 'px';
        wrap.style.height = vp.height + 'px';

        const canvas  = document.createElement('canvas');
        canvas.width  = vp.width; canvas.height = vp.height;
        const overlay = document.createElement('canvas');
        overlay.className = 'overlay';
        overlay.width  = vp.width; overlay.height = vp.height;

        wrap.appendChild(canvas); wrap.appendChild(overlay);
        container.appendChild(wrap);
        pagesDiv.appendChild(container);

        pageData.push({ n, page, vp, scale, wrap, canvas, overlay, rendered: false });
      }

      // ── Phase 2: lazy-render pages via IntersectionObserver ─────────────────
      // The full document is always scrollable; only pages entering the viewport
      // are actually rendered. This keeps memory and CPU low for large PDFs.
      const renderObs = new IntersectionObserver(entries => {
        for (const entry of entries) {
          if (!entry.isIntersecting) continue;
          const pd = pageData[parseInt(entry.target.dataset.n) - 1];
          if (pd.rendered) return;
          pd.rendered = true;
          renderObs.unobserve(entry.target);
          pd.page.render({ canvasContext: pd.canvas.getContext('2d'), viewport: pd.vp });
        }
      }, { rootMargin: '400px 0px' });

      for (const pd of pageData) {
        pd.wrap.dataset.n = pd.n;
        renderObs.observe(pd.wrap);
      }

      // ── Phase 3: navigate to stored page number (reliable) ──────────────────
      // page_number is set during ingest by PyMuPDF, so it's always correct.
      // For legacy docs (indexed before this feature) targetPg is null — fall
      // back to scanning all pages by text.
      if (targetPg && pageData[targetPg - 1]) {
        const pd = pageData[targetPg - 1];

        // Scroll immediately — no text scanning needed.
        pd.wrap.scrollIntoView({ behavior: 'smooth', block: 'center' });

        // Highlight the chunk across up to three pages:
        //   page N-1 (prevPd) — in case the chunk started before the stored page
        //   page N   (pd)     — the stored page; always highlighted
        //   page N+1 (nextPd) — in case the chunk continues past the stored page
        if (fullText) {
          const prevPd = targetPg > 1 ? pageData[targetPg - 2] : null; // [targetPg-2] = page N-1
          if (prevPd) await tryHighlightHead(prevPd.page, prevPd.vp, prevPd.scale, prevPd.overlay, fullText);
          await tryHighlight(pd.page, pd.vp, pd.scale, pd.overlay, fullText);
          const nextPd = pageData[targetPg]; // targetPg is 1-indexed; [targetPg] = page N+1
          if (nextPd) await tryHighlightTail(nextPd.page, nextPd.vp, nextPd.scale, nextPd.overlay, fullText);
        }

        const t = document.createElement('div');
        t.className = 'toast';
        t.textContent = `Chunk found on page ${targetPg}`;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3400);

      } else if (fullText) {
        // ── Legacy fallback: scan pages for text match ───────────────────────
        let found = false;
        for (const pd of pageData) {
          const tc      = await pd.page.getTextContent();
          const items   = tc.items;
          const anchors = normAlpha(fullText).split(' ').filter(w => w.length >= 4).slice(0, 10);
          const chunkWC = wordCount(fullText);

          let pageAlpha = '';
          for (const it of items) { pageAlpha += normAlpha(it.str || '') + ' '; }

          const searchAnchor = normAlpha(fullText).slice(0, 130);
          const idx = searchAnchor ? pageAlpha.indexOf(searchAnchor) : -1;
          const matched = idx !== -1 ||
            highlightByWords(items, anchors, chunkWC, pd.overlay.getContext('2d'), pd.vp, pd.scale);

          if (idx !== -1) {
            highlightItems(items, idx, idx + normAlpha(fullText).length,
              pd.overlay.getContext('2d'), pd.vp, pd.scale);
          }

          if (matched) {
            found = true;
            pd.wrap.scrollIntoView({ behavior: 'smooth', block: 'center' });
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = `Chunk found on page ${pd.n}`;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3400);
            break;
          }
        }
        if (!found) {
          // Show first page; user can scroll manually.
          pageData[0]?.wrap.scrollIntoView({ block: 'start' });
        }
      }

    } catch (err) {
      statusEl.textContent = 'Failed to load PDF: ' + err.message;
      statusEl.classList.add('error');
    }
  }

  main();
  </script>
</body>
</html>
